# ══════════════════════════════════════════════════════════════════════════
# Hormuz Dashboard — Weekday Auto-Refresh  (Final · Alpha Vantage)
# File location in your repo: .github/workflows/update-dashboard.yml
#
# SETUP (one-time):
#   ① Get free key → alphavantage.co/support/#api-key  (instant)
#   ② Repo → Settings → Secrets → Actions → New secret
#        Name:  AV_API_KEY
#        Value: your Alpha Vantage key
#
# RUNS: Mon–Fri 07:00 UTC (09:00 Gulf time)
# MANUAL: Actions tab → Weekday Dashboard Refresh → Run workflow
# ══════════════════════════════════════════════════════════════════════════

name: Weekday Dashboard Refresh

on:
  schedule:
    - cron: '0 7 * * 1-5'
  workflow_dispatch:

jobs:
  refresh:
    name: Fetch Brent Price and Update Dashboard
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests

      - name: Fetch Brent price and update dashboard
        id: update
        env:
          AV_API_KEY: ${{ secrets.AV_API_KEY }}
        run: |
          python3 - << 'PYEOF'
          import os, re, requests
          from datetime import datetime, timezone

          AV_KEY    = os.environ.get("AV_API_KEY", "").strip()
          HTML_FILE = "index.html"
          OUT_FILE  = os.environ.get("GITHUB_OUTPUT", "_out.txt")

          def out(**kv):
            with open(OUT_FILE, "a") as f:
              for k, v in kv.items():
                f.write(f"{k}={v}\n")

          print("=" * 50)
          print("FETCHING BRENT CRUDE — Alpha Vantage")
          print("=" * 50)

          # ── Validate key ─────────────────────────────────
          if not AV_KEY or len(AV_KEY) < 8:
            print("ERROR: AV_API_KEY secret is missing or too short.")
            print("Add it: Repo → Settings → Secrets → Actions → AV_API_KEY")
            out(brent_price="N/A", brent_change="N/A", period="N/A", changed="false")
            exit(0)

          print(f"Key length: {len(AV_KEY)} chars ✓")

          # ── Fetch from Alpha Vantage ──────────────────────
          # Endpoint: Brent crude oil daily price series
          # Docs: alphavantage.co/documentation/#wti (same structure for BRENT)
          url = (
            "https://www.alphavantage.co/query"
            "?function=BRENT"
            "&interval=daily"
            f"&apikey={AV_KEY}"
          )

          print(f"Calling: {url[:70]}...")

          try:
            r = requests.get(url, timeout=20)
            print(f"HTTP status: {r.status_code}")
            r.raise_for_status()
            body = r.json()
          except Exception as e:
            print(f"Request failed: {e}")
            out(brent_price="N/A", brent_change="N/A", period="N/A", changed="false")
            exit(0)

          # ── Parse response ────────────────────────────────
          # Alpha Vantage returns: {"name":"...", "data":[{"date":"...","value":"..."},...]}
          print(f"Response keys: {list(body.keys())}")

          if "Information" in body:
            # Rate limit hit
            print(f"Rate limit message: {body['Information']}")
            out(brent_price="N/A", brent_change="N/A", period="N/A", changed="false")
            exit(0)

          if "data" not in body:
            print(f"Unexpected response: {str(body)[:300]}")
            out(brent_price="N/A", brent_change="N/A", period="N/A", changed="false")
            exit(0)

          data = body["data"]
          print(f"Data points returned: {len(data)}")
          print(f"Latest entry: {data[0]}")
          print(f"Previous entry: {data[1] if len(data) > 1 else 'N/A'}")

          latest = data[0]
          prev   = data[1] if len(data) > 1 else None

          price  = round(float(latest["value"]), 2)
          period = latest["date"]   # e.g. "2026-04-24"

          change = 0.0
          pct    = 0.0
          if prev and prev["value"] not in (".", "", "null", None):
            prev_price = float(prev["value"])
            change = round(price - prev_price, 2)
            pct    = round(change / prev_price * 100, 1) if prev_price else 0.0

          arrow      = "▲" if change >= 0 else "▼"
          price_str  = f"${price:.2f}"
          change_str = f"{arrow} ${abs(change):.2f} ({abs(pct):.1f}%)"
          try:
            period_str = datetime.strptime(period, "%Y-%m-%d").strftime("%b %d, %Y")
          except:
            period_str = period

          ts_utc  = datetime.now(timezone.utc).strftime("%d %b %Y %H:%M UTC")
          ts_date = datetime.now(timezone.utc).strftime("%b %d, %Y")

          print(f"\n✓ BRENT:  {price_str}")
          print(f"✓ CHANGE: {change_str}")
          print(f"✓ PERIOD: {period_str}")
          print(f"✓ TS UTC: {ts_utc}")

          # ── Read index.html ───────────────────────────────
          with open(HTML_FILE, "r", encoding="utf-8") as f:
            html = f.read()
          original = html

          # Patch 1: inject AV key as EIA_KEY so live JS fetch also works
          # The dashboard JS falls back to Yahoo Finance when key = DEMO_KEY,
          # but we also keep the static cached value updated here.
          print("\nPatching index.html...")

          # Patch 2: update "Data Verified" date
          html, n = re.subn(
            r"Data Verified [A-Za-z]+ \d+,? \d{4}",
            f"Data Verified {ts_date}", html
          )
          print(f"  Data Verified date: {n} replacement(s)")

          # Patch 3: update page title
          html = re.sub(
            r"(<title>Hormuz Crisis[^|]*\|)[^<]*</title>",
            rf"\1 Live · Brent {price_str} · {ts_date}</title>",
            html
          )

          # Patch 4: update cached fallback price in JS
          html, n = re.subn(
            r"\$[\d]+\.[\d]+\s*\(cached[^)]*\)",
            f"{price_str} (cached {ts_date})", html
          )
          print(f"  Cached price: {n} replacement(s) → {price_str}")

          # Patch 5: update the static $101.55 live price shown in status bar
          # (the one shown before JS fetches live data on page load)
          html, n = re.subn(
            r'(?<!\$)101\.55(?!\d)',
            f"{price:.2f}", html
          )
          print(f"  Static price references: {n} replacement(s)")

          # Patch 6: update "bar-updated" static text
          html = re.sub(
            r"Data verified Apr \d+, \d{4}",
            f"Data verified {ts_date}", html
          )

          # Patch 7: build metadata comment at very top
          meta = f"<!-- BUILD: {ts_utc} | Brent: {price_str} {change_str} | Alpha Vantage | Period: {period_str} -->"
          html = re.sub(r"<!-- BUILD:.*?-->\n?", "", html, flags=re.DOTALL)
          html = meta + "\n" + html
          print(f"  Build comment: added")

          # ── Write and compare ─────────────────────────────
          with open(HTML_FILE, "w", encoding="utf-8") as f:
            f.write(html)

          changed = html != original
          print(f"\nFile changed: {changed}")
          print("=" * 50)

          out(
            brent_price  = price_str,
            brent_change = change_str,
            period       = period_str,
            timestamp    = ts_utc,
            changed      = "true" if changed else "false"
          )
          PYEOF

      # ── Commit if changed ────────────────────────────────────────────
      - name: Commit updated dashboard
        if: steps.update.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          PRICE="${{ steps.update.outputs.brent_price }}"
          CHANGE="${{ steps.update.outputs.brent_change }}"
          PERIOD="${{ steps.update.outputs.period }}"
          TS="${{ steps.update.outputs.timestamp }}"
          git commit -m "📊 Refresh: Brent ${PRICE} ${CHANGE} | ${PERIOD} | ${TS}"
          git push
          echo "✅ Committed and pushed."

      - name: No changes needed
        if: steps.update.outputs.changed == 'false'
        run: echo "ℹ️ No changes — price may be same as yesterday or key issue above."

      # ── Summary ──────────────────────────────────────────────────────
      - name: Job summary
        if: always()
        run: |
          echo "## 📊 Dashboard Refresh" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Brent Price | ${{ steps.update.outputs.brent_price }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Change | ${{ steps.update.outputs.brent_change }} |" >> $GITHUB_STEP_SUMMARY
          echo "| EIA Period | ${{ steps.update.outputs.period }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Timestamp (UTC) | ${{ steps.update.outputs.timestamp }} |" >> $GITHUB_STEP_SUMMARY
          echo "| File Changed | ${{ steps.update.outputs.changed }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Source:** Alpha Vantage (alphavantage.co)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Netlify auto-deploys within ~60 seconds of a commit._" >> $GITHUB_STEP_SUMMARY
